# qmd.yml — qmd semantic search index configuration
#
# Defines collections for semantic querying via `qmd query "<question>"`.
# Run `node .opencode/scripts/qmd-index.js` to build/update the index.
#
# Install: npm install -g @tobilu/qmd (requires Node >= 22)
# First run downloads ~2GB embedding model.
#
# NOTE: qmd.yml is documentation — it does NOT drive the live index.
# Collections are registered in the qmd SQLite index (~/.cache/qmd/index.sqlite)
# via `qmd collection add`. The /bootstrap command registers all collections.
# This file exists to document the intended collection layout.
#
# Coverage: all .md files across content directories. .opencode/ (except skills/) is excluded.
# Collections: meta, context, codebases, resources, skills, journal, inbox, projects, areas, archive

collections:
  - name: meta
    path: meta/
    description: "Knowledge graph operational files — tag registry, Confluence sync registry, resources operation log"
  - name: context
    path: context/
    description: "Author identity, team, active projects, commit conventions, and global safety rules"
  - name: codebases
    path: codebases/
    description: "Per-codebase context — architecture, tech stack, build, test, CI, coding conventions"
  - name: resources
    path: resources/
    description: "Reference articles — atomic, topic-based knowledge"
  - name: skills
    path: .opencode/skills/  # dotfile dir — leading dot is intentional
    description: "Custom skills — domain-specific workflows and templates"
  - name: journal
    path: journal/
    description: "Time-based notes — daily, weekly, meetings"
  - name: inbox
    path: inbox/
    description: "Unprocessed captures and scratch pad"
  - name: projects
    path: projects/
    description: "Active project dashboards, specs, and plans"
  - name: areas
    path: areas/
    description: "Ongoing responsibility dashboards"
  - name: archive
    path: archive/
    description: "Completed and inactive projects, areas, and resources"
